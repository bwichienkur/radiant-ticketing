# Production Docker Compose overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build
version: "3.9"

services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Observability__Enabled: "true"
      Observability__OtlpEndpoint: http://otel-collector:4317
      Observability__EnablePrometheusMetrics: "true"

  web:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Observability__Enabled: "true"
      Observability__OtlpEndpoint: http://otel-collector:4317
      Observability__EnablePrometheusMetrics: "true"

  worker:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Observability__Enabled: "true"
      Observability__OtlpEndpoint: http://otel-collector:4317
      Observability__EnablePrometheusMetrics: "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
