name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  clientapp:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/EnhancementHub.Web/ClientApp/package-lock.json

      - name: Install and build ClientApp
        working-directory: src/EnhancementHub.Web/ClientApp
        run: |
          npm ci 2>/dev/null || npm install
          npm run build
