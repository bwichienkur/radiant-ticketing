name: Visual regression

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  storybook-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/EnhancementHub.Web/ClientApp/package-lock.json

      - name: Build Storybook static site
        working-directory: src/EnhancementHub.Web/ClientApp
        run: |
          npm ci 2>/dev/null || npm install
          npm run build-storybook

      - name: Install Playwright for visual smoke
        working-directory: scripts
        run: |
          npm ci 2>/dev/null || npm install
          npx playwright install chromium --with-deps

      - name: Capture UI kit story snapshots
        run: node scripts/storybook-visual-smoke.mjs
