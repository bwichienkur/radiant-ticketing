name: Accessibility

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  static-a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static accessibility checks
        run: node tests/a11y/static-check.mjs
