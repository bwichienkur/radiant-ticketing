# Observability stack — use with: docker compose -f docker-compose.yml -f docker-compose.observability.yml --profile observability up
version: "3.9"

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    profiles: ["observability"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
